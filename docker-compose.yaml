services:
  neo4j-loader:
    image: neo4j:community
    container_name: neo4j-loader
    volumes:
      # Use :z for SELinux context relabeling
      - ./logs:/logs:z
    command: neo4j-admin database load neo4j --from-path=logs/dumps --overwrite-destination=true

  neo4j:
    image: neo4j:community
    container_name: neo4j-community
    restart: unless-stopped
    depends_on:
      neo4j-loader:
        condition: service_completed_successfully
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      # Use :z for SELinux context relabeling
      - ./data:/data:z
      - ./logs:/logs:z
      - ./plugins:/plugins:z
      - ./import:/import
    environment:
      - NEO4J_AUTH=neo4j/password123
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1G
      - NEO4J_dbms_memory_pagecache_size=512m
  neo4jV2:
    image: neo4j:community
    container_name: neo4j-community-v2
    restart: unless-stopped
    ports:
      - "8474:7474"
      - "8687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password123
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1G
      - NEO4J_dbms_memory_pagecache_size=512m
